<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta http-equiv="X-Frame-Options" content="DENY" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'; connect-src 'self';" />
  <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />
  <meta http-equiv="Permissions-Policy" content="geolocation=(), microphone=(), camera=()" />
  <title id="page-title">Gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- NAV -->
  <nav id="navbar" aria-label="Main navigation">
    <div class="nav-inner">
      <a class="nav-logo" id="nav-logo" href="#top">Gallery</a>
      <button class="nav-toggle" id="nav-toggle" aria-label="Open menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links" id="nav-links" role="list"></ul>
    </div>
  </nav>

  <!-- MAIN CONTENT -->
  <main id="top">
    <div id="content-root"></div>
  </main>

  <!-- FOOTER -->
  <footer id="site-footer">
    <div class="footer-inner">
      <p id="footer-author"></p>
      <div id="footer-links" class="footer-links">
  <a href="mailto:lorenzofranzin17@gmail.com">Email</a>
  <a href="https://instagram.com/_franzin17" target="_blank" rel="noopener noreferrer">Instagram</a>
</div>
    </div>
  </footer>

  <!-- LIGHTBOX -->
  <div id="lightbox" role="dialog" aria-modal="true" aria-label="Image viewer" hidden>
    <button id="lb-close" aria-label="Close">&#x2715;</button>
    <button id="lb-prev" aria-label="Previous image">&#8592;</button>
    <button id="lb-next" aria-label="Next image">&#8594;</button>
    <div id="lb-content">
      <img id="lb-img" src="" alt="" />
      <p id="lb-caption"></p>
    </div>
  </div>


  <script src="app.js"></script>
</body>
</html>
